services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64   # PostGIS 17-3.5 has no arm64 manifest; runs via Rosetta2 on Apple Silicon
    environment:
      POSTGRES_USER: beenthere
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: beenthere_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beenthere -d beenthere_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
